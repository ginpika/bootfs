server.port=8181
spring.config.activate.on-profile=dev
spring.servlet.multipart.maxFileSize=4096MB
spring.servlet.multipart.maxRequestSize=4096MB
spring.jackson.default-property-inclusion=non_null
server.tomcat.basedir=/Users/yuzhou.jin/Documents/worktable/bootfs/cache
server.tomcat.connection-timeout=1800000

# DevTools - Hot Reload
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/resources/templates,src/main/resources/static
spring.devtools.restart.exclude=static/**,.git/**
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

tfs.copies=1
tfs.web-entrypoint=http://localhost:8181
tfs.root-path=/Users/yuzhou.jin/Documents/worktable/bootfs/bootfs
tfs.ffmpeg-url=/opt/homebrew/opt/ffmpeg-full/bin/ffmpeg
tfs.thumbnail-width=480
tfs.thumbnail-quality=80

etcd.endpoints=http://localhost:2379

meili-search.url=http://localhost:7700
meili-search.master-key=TheBindingOfIssac
meili-search.web-ui=http://localhost:7700

# SSO Configuration
sso.enabled=false
sso.server-url=http://localhost:3001
sso.info-url=http://localhost:3000/sso/info
sso.cookie-name=sso_token

# S3 Compatible API
s3.enabled=true
s3.access-key=bootfs
s3.secret-key=bootfs-secret-dev
s3.region=us-east-1
s3.bucket=bootfs