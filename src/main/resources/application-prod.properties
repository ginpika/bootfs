server.port=8181
spring.config.activate.on-profile=prod
spring.servlet.multipart.maxFileSize=4096MB
spring.servlet.multipart.maxRequestSize=4096MB
spring.jackson.default-property-inclusion=non_null
server.tomcat.connection-timeout=1800000
server.tomcat.basedir=/app/cache

tfs.copies=1
tfs.web-entrypoint=/
tfs.root-path=/app
tfs.path-prefix=/app/data/
tfs.config=/app/db.json
tfs.ffmpeg-url=/usr/bin/ffmpeg
tfs.thumbnail-width=480
tfs.thumbnail-quality=80

etcd.endpoints=http://etcd:2379

meili-search.url=http://meilisearch:7700
meili-search.master-key=default_key
meili-search.web-ui=/

# SSO Configuration
sso.enabled=true
sso.server-url=https://mail-api.nihilx.com
sso.info-url=http://mail.nihilx.com/sso/info
sso.cookie-name=sso_token

# S3 Compatible API
s3.enabled=true
s3.access-key=bootfs
s3.secret-key=bootfs-secret-prod
s3.region=us-east-1
s3.bucket=bootfs