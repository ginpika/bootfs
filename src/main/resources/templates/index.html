<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>TFS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.22.5/dist/bootstrap-table.min.css">
    <link rel="stylesheet" href="/bootstrap-table-page-jump.css">
    <link rel="stylesheet" href="/default.css">
    <link rel="icon" href="/favicon.ico" sizes="any">
</head>

<body>
    <div class="container-fluid row" style="height: 100vh;min-width: 1460px">
        <!-- 消息框 -->
        <div style="col-lg-12;height: 0px;">
            <div id="removeSuccessMsg" class="toast align-items-center text-bg-success border-0"
                style="margin: 12px auto;z-index:999;position:relative" role="alert" aria-live="assertive"
                aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body">
                        操作成功
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                        aria-label="Close"></button>
                </div>
            </div>

            <div id="removeFailedMsg" class="toast align-items-center text-bg-danger border-0"
                style="margin: 12px auto;z-index:999;position:relative" role="alert" aria-live="assertive"
                aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body">
                        操作失败
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                        aria-label="Close"></button>
                </div>
            </div>

            <div class="toast-container position-fixed bottom-0 end-0 p-3">
                <div id="liveToast" style="width:500px" class="toast" role="alert" aria-live="assertive"
                    aria-atomic="true">
                    <div class="toast-header">
                        <strong class="me-auto" id="hlsConvertUuid">Bootstrap</strong>
                        <small>just now</small>
                        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                    <div class="toast-body" id="hlsConvertMsg">
                        Hello, world! This is a toast message.
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-12">
            <div class="container-fluid p-3" style="height: 100vh;">
                <!-- 工具栏（会被 bootstrap-table 使用） -->
                <div id="toolbar" class="d-flex flex-wrap align-items-center gap-2">
                    <!-- 用户信息 -->
                    <div class="btn-group">
                        <button type="button" class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle me-1"></i>
                            <span th:text="${ssoUser != null ? ssoUser.username : 'Unknown'}">User</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-start">
                            <li><a class="dropdown-item" href="#"><small th:text="${ssoUser != null ? ssoUser.email : ''}">email</small></a></li>
                            <li><a class="dropdown-item" href="#"><small th:text="${ssoUser != null ? ssoUser.role : ''}">role</small></a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item" th:href="${ssoInfoUrl}" href="#" target="_blank">
                                    <i class="bi bi-person-badge me-1"></i>SSO 信息
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/api/logout"><i class="bi bi-box-arrow-right me-1"></i>退出登录</a></li>
                        </ul>
                    </div>

                    <!-- 分隔线 -->
                    <div class="vr"></div>

                    <!-- 功能按钮组 -->
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-primary" id="onlyIndexedBtn">
                            <i class="bi bi-database me-1"></i>主存储
                        </button>
                        <button type="button" class="btn btn-success" id="pushToHlsConvert">
                            <i class="bi bi-play-circle me-1"></i>HLS 转码
                        </button>
                        <button type="button" class="btn btn-dark" id="pushToRandomPicture">
                            <i class="bi bi-image me-1"></i>发布图床
                        </button>
                    </div>

                    <!-- 传送门下拉 -->
                    <div class="btn-group">
                        <button type="button" class="btn btn-info dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-door-open me-1"></i>传送门
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="${meilisearchWebUi}" href="http://127.0.0.1:7700"><i class="bi bi-search me-2"></i>MeiliSearch</a></li>
                            <li><a class="dropdown-item" href="/gallery"><i class="bi bi-images me-2"></i>Gallery</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-arrow-repeat me-2"></i>重建索引</a></li>
                        </ul>
                    </div>

                    <!-- 批量操作 -->
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-outline-secondary" id="batchDownload">
                            <i class="bi bi-download me-1"></i>下载
                        </button>
                        <button type="button" class="btn btn-outline-danger" id="batchDelete">
                            <i class="bi bi-trash me-1"></i>删除
                        </button>
                    </div>

                    <!-- 分隔线 -->
                    <div class="vr"></div>

                    <!-- 上传按钮 -->
                    <label class="btn btn-outline-success mb-0">
                        <i class="bi bi-upload me-1"></i>上传
                        <input type="file" id="upload_file_btn" class="d-none" multiple>
                    </label>
                    
                    <!-- 上传进度通知 -->
                    <div id="uploadProgressNotification" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100; display: none;">
                        <div class="toast show" role="alert" aria-live="assertive" aria-atomic="true">
                            <div class="toast-header">
                                <i class="bi bi-upload me-2 text-success"></i>
                                <strong class="me-auto">上传进度</strong>
                                <small id="uploadProgressPercent">0%</small>
                                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                            </div>
                            <div class="toast-body">
                                <div class="progress" style="height: 20px;">
                                    <div id="uploadProgressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;">0%</div>
                                </div>
                                <div class="mt-2 small text-muted">
                                    <span id="uploadProgressFile">准备上传...</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 分隔线 -->
                    <div class="vr"></div>

                    <!-- 新版 UI -->
                    <a href="/" class="btn btn-outline-primary">
                        <i class="bi bi-stars me-1"></i>新版界面
                    </a>
                </div>

                <div class="row p-3" id="main-container">
                    <table class="table table-striped table-bordered table-hover" id="fileListDynamic"></table>
                </div>

                <div class="row" id="main-container-footer">
                    <!--style="position:relative; top:-62px;left: 12px;height: 0px;width:300px"-->
                    <div class="container-fluid d-flex flex-wrap">
                        <!-- Button trigger modal -->
                        <button type="button" style="display: none" class="btn btn-primary" data-bs-toggle="modal"
                            data-bs-target="#uploadSuccessModel">
                            Test: Launch upload modal
                        </button>

                        <!-- Modal -->
                        <div class="modal fade" id="uploadSuccessModel" tabindex="-1"
                            aria-labelledby="uploadSuccessModel" aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h1 class="modal-title fs-5">上传文件</h1>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        上传成功
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Modal -->
                        <div class="modal fade" id="batchDeleteModel" tabindex="-1" aria-labelledby="batchDeleteModel"
                            aria-hidden="true">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h1 class="modal-title fs-5">批量删除文件确认</h1>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        确认要删除吗？
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭
                                        </button>
                                        <button type="button" class="btn btn-primary" id="batchDeleteModelConfirm">确认
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Modal -->
                        <div class="modal fade" id="deleteModel" tabindex="-1" aria-labelledby="deleteModel"
                            aria-hidden="true">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h1 class="modal-title fs-5">删除文件确认</h1>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        确认要删除吗？
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭
                                        </button>
                                        <button type="button" class="btn btn-primary"
                                            id="deleteModelConfirm">确认</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row p-3">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.22.5/dist/bootstrap-table.min.js"></script>-->
    <script src="/bootstrap-table.min.js"></script>
    <script src="bootstrap-table-page-jump.js"></script>
    <script>
        const $table = $('#fileListDynamic')
        const deleteModel = new bootstrap.Modal('#deleteModel', {})
        let lastSelectedUuid4Delete = null
        const removeSuccessToast = new bootstrap.Toast("#removeSuccessMsg");
        const removeFailedToast = new bootstrap.Toast("#removeFailedMsg");

        // online note
        // https://blog.csdn.net/jintingbo/article/details/82924330
        function initFileList() {
            $table.bootstrapTable({
                columns: [
                    { checkbox: 'true' },
                    // { field: 'uuid', title: 'UUID', sortable: false, width: "360px" },
                    {
                        field: 'uuid', title: 'UUID', width: "200px",
                        formatter: function (val, row) {
                            return "<span style='margin:0px'>"
                                + (row.copyOf ? "<span style='margin:0px 4px;position:relative;top:-2px' title=" + row.copyOf + " class='badge text-bg-primary'>副本</span>" : "")
                                + (row.hlsAvailable ? "<span  style='margin:0px 4px;position:relative;top:-2px' class='badge text-bg-success'><a style='color:white' href='" + window.location + "/video-player?uuid=" + row.uuid + "'>HLS可用</a></span>" : "")
                                + (row.albumAvailable ? "<span  style='margin:0px 4px;position:relative;top:-2px;color: white' class='badge rounded-pill text-bg-info'><a style='color:white' href='" + window.location + "album/" + row.uuid + "'>相册可用</a></span>" : "")
                                + (row.isPublicAccess ? "<span  style='margin:0px 4px;position:relative;top:-2px;color: white' class='badge rounded-pill text-bg-dark'><a style='color:white'>画廊</a></span>" : "")
                                + (row.copyOf || row.hlsAvailable || row.albumAvailable || row.isPublicAccess ? "<br/>" : "")
                                + val + "</span>"
                        }
                    },
                    { field: 'path', title: '本地路径', sortable: false },
                    {
                        field: 'fileName', title: '标题', sortable: false,
                        formatter: function (val, row) {
                            return "<a href='" + window.location + "p/" + row.uuid + "' target='_blank'>" + val + "</a>"
                        }
                    },
                    { field: 'url', title: 'URL', formatter: function (val, row) { return "<a href='" + val + "' download='" + row.fileName + "' target='_blank'>" + val + "</a>" } },
                    { field: 'checked', title: '操作', valign: "middle", width: "100px", formatter: function (val, row) { return "<button file-uuid-bind='" + row.uuid + "' class='btn btn-primary delete-button'>删除</button>" } }
                ],
                // data: res.rows,
                toolbar: '#toolbar',
                search: true,
                showRefresh: true,
                showExport: false,
                showFooter: false,
                // exportTypes: ['csv', 'txt', 'xml'],
                sidePagination: "server", // server or client
                url: "/queryPageOffset",
                cache: false,
                dataType: "json",
                queryParams: function (params) {
                    // console.log(params)
                    return {
                        pageNumber: params.offset,
                        pageSize: params.limit,
                        search: params.search
                    };
                },
                method: 'get',
                pageSize: 10,
                pageNumber: 1,
                pagination: true,
                paginationPreText: '上一页',
                paginationNextText: '下一页',
                paginationParts: ["pageList"],
                showPaginationSwitch: false, // 分页隐藏按钮
                showExtendedPagination: false,
                undefinedText: "",
                paginationShowPageGo: true
            })

            $table.on('post-body.bs.table', function (params) {
                $(".delete-button").each((i, dom) => {
                    $(dom).on("click", function () {
                        lastSelectedUuid4Delete = $(dom).attr("file-uuid-bind");
                        deleteModel.show()
                    })
                })
            })

            $("#deleteModelConfirm").on('click', function () {
                let selected = $table.bootstrapTable("getSelections")
                deleteModel.hide()
                $.post("/removeFileByUuid?uuid=" + lastSelectedUuid4Delete).then(res => {
                    if (res) {
                        removeSuccessToast.show();
                    } else {
                        removeFailedToast.show();
                    }
                    $table.bootstrapTable("refresh");
                    setTimeout(function () {
                        removeSuccessToast.hide();
                        removeFailedToast.hide();
                    }, 2000)
                })
            })
        }

        initFileList()
    </script>

    <footer>
        <script>
            $(document).ready(function () {
                setTimeout(function () {
                    $("#upload_file_btn").on("change", function (ipt) {
                        let fd = new FormData()
                        if (ipt.target.files.length < 1) return;
                        
                        const files = ipt.target.files;
                        const totalFiles = files.length;
                        let uploadedCount = 0;
                        
                        // 显示进度通知
                        const $notification = $("#uploadProgressNotification");
                        const $progressBar = $("#uploadProgressBar");
                        const $progressPercent = $("#uploadProgressPercent");
                        const $progressFile = $("#uploadProgressFile");
                        
                        $notification.show();
                        $progressBar.css("width", "0%").text("0%");
                        $progressPercent.text("0%");
                        
                        // 逐个上传文件
                        const uploadFile = (file, index) => {
                            return new Promise((resolve, reject) => {
                                const fileFd = new FormData();
                                fileFd.append("file", file);
                                
                                $progressFile.text(`正在上传: ${file.name} (${index + 1}/${totalFiles})`);
                                
                                let startAt = new Date();
                                console.log(`开始上传: ${file.name}`);
                                
                                $.ajax({
                                    url: '/f',
                                    type: 'PUT',
                                    data: fileFd,
                                    contentType: false,
                                    processData: false,
                                    timeout: 0,
                                    xhr: function () {
                                        let xhr = new XMLHttpRequest();
                                        xhr.upload.addEventListener('progress', function (event) {
                                            if (event.lengthComputable) {
                                                let filePercent = (event.loaded / event.total) * 100;
                                                let totalPercent = ((uploadedCount + (filePercent / 100)) / totalFiles) * 100;
                                                
                                                $progressBar.css("width", totalPercent.toFixed(1) + "%").text(totalPercent.toFixed(1) + "%");
                                                $progressPercent.text(totalPercent.toFixed(1) + "%");
                                            }
                                        }, false);
                                        return xhr;
                                    },
                                    success: function (response) {
                                        let endAt = new Date();
                                        console.log(`文件上传完毕: ${file.name}, 耗时: ${(endAt - startAt)}ms`);
                                        uploadedCount++;
                                        resolve(response);
                                    },
                                    error: function (jqXHR, textStatus, errorThrown) {
                                        console.log(`文件上传失败: ${file.name}`);
                                        reject(errorThrown);
                                    }
                                });
                            });
                        };
                        
                        // 依次上传所有文件
                        (async () => {
                            try {
                                for (let i = 0; i < files.length; i++) {
                                    await uploadFile(files[i], i);
                                }
                                
                                // 全部上传完成
                                $progressBar.removeClass("progress-bar-animated").addClass("bg-success");
                                $progressFile.text(`上传完成！共 ${totalFiles} 个文件`);
                                $progressPercent.text("100%");
                                
                                // 刷新文件列表
                                $table.bootstrapTable('refresh');
                                document.getElementById("upload_file_btn").value = null;
                                
                                // 显示成功提示
                                removeSuccessToast.show();
                                setTimeout(() => removeSuccessToast.hide(), 2000);
                                
                                // 3秒后隐藏进度通知
                                setTimeout(() => {
                                    $notification.fadeOut();
                                    $progressBar.addClass("progress-bar-animated").removeClass("bg-success");
                                }, 3000);
                                
                            } catch (error) {
                                $progressBar.removeClass("bg-success").addClass("bg-danger");
                                $progressFile.text("上传失败: " + error);
                                
                                removeFailedToast.show();
                                setTimeout(() => removeFailedToast.hide(), 2000);
                                
                                setTimeout(() => {
                                    $notification.fadeOut();
                                    $progressBar.removeClass("bg-danger");
                                }, 3000);
                            }
                        })();
                    });

                    const batchDeleteModel = new bootstrap.Modal('#batchDeleteModel', {})
                    $("#batchDelete").on("click", function () {
                        let selected = $table.bootstrapTable("getSelections")
                        if (selected.length < 1) return;
                        batchDeleteModel.show()
                    });

                    $("#batchDeleteModelConfirm").on("click", function () {
                        let selected = $table.bootstrapTable("getSelections")
                        let uuids = []
                        selected.forEach(r => {
                            uuids.push(r.uuid)
                        })
                        $.ajax({
                            url: "/removeFileBatch",
                            type: "POST",
                            dataType: "JSON",
                            contentType: "application/json",
                            data: JSON.stringify(uuids),
                            success: function (data) {
                                batchDeleteModel.hide()
                                $table.bootstrapTable('refresh')
                                removeSuccessToast.show();
                                setTimeout(function () {
                                    removeSuccessToast.hide()
                                }, 2000)
                            }
                        })
                    });

                    $("#onlyIndexedBtn").on("click", function () {
                        $($(".search-input")[0]).val("meta:index")
                        $('#fileListDynamic').bootstrapTable("refreshOptions", { searchText: "meta:index" })
                        // $('#fileListDynamic').bootstrapTable("refresh", {url:"/queryPageOffset", query:{search:"meta:index"}})
                    });

                    $("#pushToHlsConvert").on("click", function () {
                        let selected = $table.bootstrapTable("getSelections");
                        if (selected.length == 0) return;
                        selected = selected[0];
                        $.get("/hls/convert?uuid=" + selected.uuid).then(res => {
                            removeSuccessToast.show();
                            setTimeout(function () {
                                removeSuccessToast.hide()
                            }, 2000)
                            $("#hlsConvertUuid").text(selected.uuid)
                            $("#hlsConvertMsg").text(res)
                            const toast = new bootstrap.Toast(document.getElementById('liveToast'))
                            toast.show();
                        })
                    });

                    $("#pushToRandomPicture").on("click", function () {
                        let selected = $table.bootstrapTable("getSelections");
                        if (selected.length == 0) return;
                        selected.forEach(r => {
                            $.ajax({
                                url: "/publicAccess/" + r.uuid,
                                type: "POST",
                                dataType: "JSON",
                                contentType: "application/json",
                                success: function (data) {
                                    $("#hlsConvertUuid").text(r.uuid)
                                    $("#hlsConvertMsg").text("成功发布")
                                    const toast = new bootstrap.Toast(document.getElementById('liveToast'))
                                    toast.show();
                                },
                                error: function (error) {
                                },
                                complete: function () {
                                    $("#hlsConvertUuid").text(r.uuid)
                                    $("#hlsConvertMsg").text("成功发布")
                                    const toast = new bootstrap.Toast(document.getElementById('liveToast'))
                                    toast.show();
                                }
                            })
                        })
                    });

                    $("#batchDownload").on("click", function () {
                        let selected = $table.bootstrapTable("getSelections")
                        let uuids = []
                        selected.forEach(r => {
                            uuids.push(r.uuid)
                        })
                        $.ajax({
                            url: "/downloadFileBatch",
                            type: "POST",
                            dataType: "JSON",
                            contentType: "application/json",
                            data: JSON.stringify(uuids),
                            success: function (data) {
                                console.log("get:" + data.uuid)
                                var iframe = document.createElement('iframe');
                                iframe.style.display = 'none'
                                document.body.appendChild(iframe)
                                iframe.src = "/g/b/" + data.uuid
                            },
                            error: function (error) {
                                console.log('请求失败！');
                                console.log(error);
                            },
                            complete: function () {
                                console.log('请求结束！');
                            }
                        })
                    });
                }, 200)

                var dropdownElementList = [].slice.call(document.querySelectorAll('.dropdown-toggle'))
                var dropdownList = dropdownElementList.map(function (dropdownToggleEl) {
                    return new bootstrap.Dropdown(dropdownToggleEl)
                })
            })
        </script>
    </footer>
</body>

</html>
