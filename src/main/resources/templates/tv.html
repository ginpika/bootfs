<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFS TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/themes.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Space Grotesk', 'system-ui', 'sans-serif'],
                        body: ['Outfit', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
        
        function initTheme() {
            const savedTheme = localStorage.getItem('tfs-theme') || 'light';
            const root = document.documentElement;
            root.className = '';
            root.classList.add(`theme-${savedTheme}`);
        }
        
        initTheme();
    </script>
    <link href="//vjs.zencdn.net/8.23.4/video-js.min.css" rel="stylesheet">
    <script src="//vjs.zencdn.net/8.23.4/video.min.js"></script>
    <style>
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            min-height: 100vh;
        }
        
        .live-badge {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .status-dot.loading {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="font-body">
    <div class="fixed top-4 left-4 z-50">
        <a href="/" class="flex items-center gap-2 px-4 py-2.5 rounded-lg transition-colors shadow-sm" style="background-color: var(--color-bg-secondary); color: var(--color-text-primary); border: 1px solid var(--color-border-primary);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            返回首页
        </a>
    </div>

    <div class="max-w-6xl mx-auto p-5">
        <div class="flex justify-between items-center mb-5 p-5 theme-rounded-xl" style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border-primary);">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold font-display" style="color: var(--color-text-primary);">TFS TV</h1>
                <span class="live-badge flex items-center gap-1.5 px-3 py-1 text-xs font-semibold text-white rounded-full" style="background-color: var(--color-danger);" id="liveBadge">
                    <span class="w-2 h-2 bg-white rounded-full"></span>
                    LIVE
                </span>
            </div>
            <div class="flex items-center gap-2 text-sm" style="color: var(--color-text-secondary);">
                <span class="status-dot w-2.5 h-2.5 rounded-full" id="statusDot" style="background-color: var(--color-success);"></span>
                <span id="statusText">加载中...</span>
            </div>
        </div>

        <div class="theme-rounded-xl overflow-hidden mb-5 shadow-lg relative" style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border-primary);">
            <video id="tvPlayer" width="1280" height="720" class="video-js vjs-big-play-centered vjs-theme-fantasy w-full" controls preload="auto">
                <source src="/tv/playlist.m3u8" type="application/x-mpegURL">
                您的浏览器不支持视频播放
            </video>
            <div id="notStartedPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center" style="background-color: #0a0a0a;">
                <svg class="w-12 h-12 mb-3" style="color: #4a4a4a;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"></path>
                </svg>
                <span style="color: #4a4a4a;">未开播</span>
            </div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 mb-5">
            <div class="theme-rounded-xl p-5 text-center" style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border-primary);">
                <div class="text-2xl font-bold" style="color: var(--color-accent-primary);" id="totalSegments" th:text="${stats.allTsListSize}">0</div>
                <div class="text-xs mt-1" style="color: var(--color-text-muted);">总切片数</div>
            </div>
            <div class="theme-rounded-xl p-5 text-center" style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border-primary);">
                <div class="text-2xl font-bold" style="color: var(--color-accent-primary);" id="totalDuration" th:text="${stats.totalDurationFormatted}">0秒</div>
                <div class="text-xs mt-1" style="color: var(--color-text-muted);">总时长</div>
            </div>
            <div class="theme-rounded-xl p-5 text-center" style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border-primary);">
                <div class="text-2xl font-bold" style="color: var(--color-accent-primary);" id="playlistWindowSize" th:text="${stats.playlistWindowSize}">5</div>
                <div class="text-xs mt-1" style="color: var(--color-text-muted);">播放窗口</div>
            </div>
            <div class="theme-rounded-xl p-5 text-center" style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border-primary);">
                <div class="text-2xl font-bold" style="color: var(--color-accent-primary);" id="elapsedSeconds" th:text="${stats.elapsedSeconds}">0s</div>
                <div class="text-xs mt-1" style="color: var(--color-text-muted);">已播时长</div>
            </div>
            <div class="theme-rounded-xl p-5 text-center" style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border-primary);">
                <div class="text-2xl font-bold" style="color: var(--color-accent-primary);" id="currentCyclePosition" th:text="${stats.currentCyclePosition}">0s</div>
                <div class="text-xs mt-1" style="color: var(--color-text-muted);">周期内位置</div>
            </div>
        </div>
    </div>

    <script>
        let player;

        document.addEventListener('DOMContentLoaded', function() {
            player = videojs('tvPlayer', {
                fluid: false,
                responsive: false,
                liveui: true,
                autoplay: true,
                muted: true,
                controls: true,
                controlBar: {
                    progressControl: false,
                    seekBar: false
                },
                html5: {
                    vhs: {
                        overrideNative: true,
                        smoothQualityChange: true,
                        fastQualityChange: true
                    },
                    nativeAudioTracks: false,
                    nativeVideoTracks: false
                }
            });

            player.on('loadedmetadata', function() {
                player.play().catch(function(err) {});
            });

            player.on('playing', function() {
                player.muted(false);
            });

            updateStatusFromServer();
            setInterval(updateStatusFromServer, 5000);
        });

        function showPlayer() {
            document.getElementById('notStartedPlaceholder').style.display = 'none';
        }

        function hidePlayer() {
            document.getElementById('notStartedPlaceholder').style.display = '';
        }

        function updateStatus(online) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const badge = document.getElementById('liveBadge');

            if (online) {
                dot.classList.remove('loading');
                dot.style.backgroundColor = 'var(--color-success)';
                text.textContent = '直播中';
                if (badge) badge.style.display = '';
                showPlayer();
            } else {
                dot.classList.add('loading');
                dot.style.backgroundColor = 'var(--color-warning)';
                text.textContent = '等待直播...';
                if (badge) badge.style.display = 'none';
                hidePlayer();
            }
        }

        function updateNotStarted() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const badge = document.getElementById('liveBadge');

            dot.classList.remove('loading');
            dot.style.backgroundColor = 'var(--color-text-muted)';
            text.textContent = '未开播';
            if (badge) badge.style.display = 'none';
            hidePlayer();
        }

        function updateStatusFromServer() {
            fetch('/tv/status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('totalSegments').textContent = data.allTsListSize;
                    document.getElementById('totalDuration').textContent = data.totalDurationFormatted;
                    document.getElementById('playlistWindowSize').textContent = data.playlistWindowSize;
                    document.getElementById('elapsedSeconds').textContent = data.elapsedSeconds || '--';
                    document.getElementById('currentCyclePosition').textContent = data.currentCyclePosition || '--';

                    if (data.live) {
                        updateStatus(true);
                    } else if (data.initialized) {
                        updateNotStarted();
                    } else {
                        updateStatus(false);
                    }
                })
                .catch(err => {
                    console.error('Failed to get status:', err);
                    updateStatus(false);
                });
        }
    </script>
</body>
</html>
