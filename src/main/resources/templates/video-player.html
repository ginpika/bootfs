<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>TFS</title>
    <link rel="stylesheet" href="/default.css">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link href="//vjs.zencdn.net/8.23.4/video-js.min.css" rel="stylesheet">
    <script src="//vjs.zencdn.net/8.23.4/video.min.js"></script>
    <style>
        body {
            background: black
        }
    </style>
</head>

<body>
<div class="container-fluid row" style="height: 100vh;">
    <div class="super-center-container">
        <video id="vjs-player" width="1280" height="720" class="video-js" controls preload="auto" data-setup='{}'>
            <source th:if="${hls == '1'}" th:each="resource:${resources}" th:src="${resource}" type="application/x-mpegURL" />
            <source th:if="${hls == '0'}" th:each="resource:${resources}" th:src="${resource}" type="video/mp4" />
        </video>
    </div>
</div>
</body>

<footer>
</footer>
